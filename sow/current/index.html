<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta http-equiv="refresh" content="0; url=/bdpc/sow/">
  <link rel="canonical" href="/bdpc/sow/">
  <link rel="icon" href="data:,">
  <title>Dunn Residence - Current SOW V4</title>
  <style>
    :root{--ink:#101828;--muted:#667085;--line:#d0d5dd;--navy:#0b1220;--green:#147a4b}
    *{box-sizing:border-box}body{margin:0;background:#eef2f6;color:var(--ink);font:15px/1.55 Arial,"Segoe UI",sans-serif}
    main{width:min(760px,calc(100% - 28px));margin:48px auto;padding:30px;border:1px solid var(--line);border-top:8px solid var(--green);border-radius:18px;background:#fff;box-shadow:0 20px 60px rgba(15,23,42,.14)}
    h1{margin:0 0 8px;font-size:30px;line-height:1.05}p{color:var(--muted)}a,button{display:inline-flex;align-items:center;justify-content:center;min-height:40px;margin:6px 6px 0 0;padding:10px 14px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--ink);font-weight:800;text-decoration:none}button{cursor:pointer}.primary{border-color:var(--green);background:var(--green);color:#fff}
  </style>
</head>
<body>
  <main>
    <h1>Current SOW V4</h1>
    <p>The current SOW is now the one-page HTML Version 4. Use the browser print/save control on that page to export PDF, consistent with the existing SOW workflow.</p>
    <a class="primary" href="/bdpc/sow/">Open current SOW V4</a>
    <button type="button" onclick="location.href='/bdpc/sow/'; setTimeout(()=>window.print(), 500)">Open and Print / Save PDF</button>
    <a href="/bdpc/sow/archive/">Revision archive</a>
  </main>
  <script>location.replace('/bdpc/sow/');</script>
</body>
</html>
