name: Publish BDPC Meeting Brief

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Materialize modular site files
        shell: bash
        run: |
          echo '' | base64 --decode > /tmp/bdpc-remaining.tgz
          tar -xzf /tmp/bdpc-remaining.tgz

      - name: Persist generated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sections README.md .nojekyll
          if ! git diff --cached --quiet; then
            git commit -m "Complete modular BDPC meeting site"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
